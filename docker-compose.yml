services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      LEADFLOW_DATABASE_URL: postgresql://leadflow:leadflow@db:5432/leadflow
      LEADFLOW_HEADLESS: "true"
      LEADFLOW_HUNTER_API_KEY: "${LEADFLOW_HUNTER_API_KEY:-}"
      LEADFLOW_SMTP_HOST: "${LEADFLOW_SMTP_HOST:-}"
      LEADFLOW_SMTP_PORT: "${LEADFLOW_SMTP_PORT:-587}"
      LEADFLOW_SMTP_USER: "${LEADFLOW_SMTP_USER:-}"
      LEADFLOW_SMTP_PASSWORD: "${LEADFLOW_SMTP_PASSWORD:-}"
      LEADFLOW_SMTP_FROM_EMAIL: "${LEADFLOW_SMTP_FROM_EMAIL:-}"
      LEADFLOW_SMTP_FROM_NAME: "${LEADFLOW_SMTP_FROM_NAME:-LeadFlow}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
